# 开发环境配置
# 注意：所有敏感配置应从环境变量读取，不要硬编码在文件中

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:camera_construction_db}?currentSchema=public
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}  # ⚠️ 必须设置环境变量 DB_PASSWORD
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}  # 可选
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

# 文件存储配置（MinIO）
file:
  storage:
    type: ${FILE_STORAGE_TYPE:minio}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:}  # ⚠️ 必须设置环境变量 MINIO_ACCESS_KEY
      secret-key: ${MINIO_SECRET_KEY:}  # ⚠️ 必须设置环境变量 MINIO_SECRET_KEY
      bucket: ${MINIO_BUCKET:camera-system}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}  # ⚠️ 必须设置环境变量 JWT_SECRET
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer 

# 日志配置
logging:
  level:
    org.springframework.security: DEBUG
    com.qidian.camera: DEBUG

# 系统配置
system:
  batch-operation:
    max-points: 50
    max-points-limit: 200
  captcha:
    login-enabled: true
    sms-enabled: false
