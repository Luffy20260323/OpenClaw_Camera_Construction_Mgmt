# 开发环境配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/camera_construction_db?currentSchema=public
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

# 文件存储配置（MinIO）
file:
  storage:
    type: minio
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: camera-system

# JWT 配置
jwt:
  secret: camera-lifecycle-system-secret-key-2026-qidian-technology
  expiration: 86400000  # 24 小时
  header: Authorization
  prefix: Bearer 

# 日志配置
logging:
  level:
    org.springframework.security: DEBUG
    com.qidian.camera: DEBUG

# 系统配置
system:
  batch-operation:
    max-points: 50
    max-points-limit: 200
  captcha:
    login-enabled: true
    sms-enabled: false
