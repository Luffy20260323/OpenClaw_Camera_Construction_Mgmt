# 生产环境配置
# 所有敏感配置必须从环境变量读取

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=public
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

# 文件存储配置（生产环境推荐使用 OSS 或本地存储）
file:
  storage:
    type: ${FILE_STORAGE_TYPE:local}
    local:
      upload-dir: ${FILE_UPLOAD_DIR:/var/www/uploads}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      access-key: ${OSS_ACCESS_KEY:}
      secret-key: ${OSS_SECRET_KEY:}
      bucket: ${OSS_BUCKET:}
    minio:
      endpoint: ${MINIO_ENDPOINT:}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:camera-system}

# JWT 配置（生产环境必须设置环境变量）
jwt:
  secret: ${JWT_SECRET}  # ⚠️ 必须设置，建议使用强随机字符串
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer 

# 系统配置
system:
  batch-operation:
    max-points: 50
    max-points-limit: 200
  captcha:
    login-enabled: true
    sms-enabled: true

# 日志配置（生产环境）
logging:
  level:
    root: WARN
    com.qidian.camera: INFO
  file:
    name: ${LOG_FILE:/var/log/camera-system/application.log}
    max-size: 100MB
    max-history: 30
