# 摄像头生命周期管理系统 - 主配置文件
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: camera-lifecycle-system
  profiles:
    active: dev

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类

# 日志配置
logging:
  level:
    root: INFO
    com.qidian.camera: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
