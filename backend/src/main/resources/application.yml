# 摄像头生命周期管理系统 - 主配置文件
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: camera-lifecycle-system
  profiles:
    active: dev
  web:
    resources:
      # 禁用默认静态资源路径，避免与 /resources API 冲突
      add-mappings: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j API 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类

# 日志配置
logging:
  level:
    root: INFO
    com.qidian.camera: DEBUG
    org.springframework.jdbc: DEBUG
    org.mybatis: DEBUG
    org.apache.ibatis: DEBUG
    com.qidian.camera.module.auth: DEBUG
    com.qidian.camera.module.menu: DEBUG
    com.qidian.camera.module.role: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 权限缓存配置
permission:
  cache:
    # 是否启用权限缓存（默认：true）
    enabled: true
    # 用户权限缓存 TTL（分钟，默认：30）
    user-ttl-minutes: 30
    # 角色权限缓存 TTL（分钟，默认：60）
    role-ttl-minutes: 60

# 文档上传配置
document:
  upload:
    path: ${DOCUMENT_UPLOAD_PATH:./uploads/documents}
    max-size: ${DOCUMENT_MAX_SIZE:52428800}  # 50MB
