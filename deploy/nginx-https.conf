# HTTPS 配置 - 生产环境使用
# 使用前请确保证书已通过 Let's Encrypt 或其他 CA 申请
# 证书路径：/etc/letsencrypt/live/YOUR_DOMAIN/

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name camera1001.pipecos.cn 1.95.153.137;
    
    # 隐藏 Nginx 版本号
    server_tokens off;
    
    # 301 永久重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name camera1001.pipecos.cn 1.95.153.137;

    # ========== SSL 证书配置 ==========
    # Let's Encrypt 证书路径
    ssl_certificate /etc/letsencrypt/live/camera1001.pipecos.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camera1001.pipecos.cn/privkey.pem;

    # 如果使用其他 CA，修改为实际路径：
    # ssl_certificate /etc/nginx/ssl/your_domain.crt;
    # ssl_certificate_key /etc/nginx/ssl/your_domain.key;

    # ========== SSL 优化配置 ==========
    include /etc/nginx/snippets/ssl-params.conf;

    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling（可选，提升性能）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # HSTS（生产环境建议启用）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 前端静态文件
    location / {
        root /var/www/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 后端 API 反向代理
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # API 文档（建议生产环境禁用或配置鉴权）
    location /doc.html {
        proxy_pass http://localhost:8080/doc.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger 资源
    location /webjars/ {
        proxy_pass http://localhost:8080/webjars/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        root /var/www/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 访问日志
    access_log /var/log/nginx/camera-access.log;
    error_log /var/log/nginx/camera-error.log;
}
