name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run linter
        run: npm run lint || echo "No lint script found, skipping..."
      
      - name: Run tests
        run: npm test || echo "No test script found, skipping..."
      
      - name: Build
        run: npm run build || echo "No build script found, skipping..."

  cleanup:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || (apt-get update && apt-get install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update && apt-get install gh -y
      
      - name: Cleanup old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep only last 10 workflow runs
          gh run list --limit 100 --json databaseId --jq '.[10:] | .[].databaseId' | xargs -I {} gh run delete {} || true
          
          # Cleanup old artifacts (older than 7 days)
          gh api /repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[] | select(.created_at < (now - 604800)) | .id' | xargs -I {} gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/{} || true
          
          echo "✅ Cleanup completed"
