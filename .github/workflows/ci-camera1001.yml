#===============================================================================
# 摄像头生命周期管理系统 - CI/CD 工作流
#===============================================================================
# 触发条件：
# - push: camera1001 分支
# - pull_request: 目标分支为 camera1001
#
# 执行任务：
# 1. 后端编译和测试
# 2. 前端构建
# 3. Docker 镜像构建
# 4. 配置文件检查
#===============================================================================

name: CI - camera1001

on:
  push:
    branches:
      - camera1001
  pull_request:
    branches:
      - camera1001

# 取消正在运行的重复工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 通用配置
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_VERSION: '3.9.6'
  # Node.js 24 兼容性设置（GitHub Actions 2026-06-02 起默认使用 Node.js 24）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  #-------------------------------------------------------------------------------
  # 任务 1：代码检查
  #-------------------------------------------------------------------------------
  code-check:
    name: 🔍 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: 🔎 检查敏感信息泄露
        run: |
          echo "检查是否包含硬编码密码..."
          ! grep -r "password.*=.*['\"]postgres['\"]" backend/src/ --include="*.yml" --include="*.yaml" || (echo "❌ 发现硬编码数据库密码" && exit 1)
          ! grep -r "secret.*=.*['\"]camera-lifecycle" backend/src/ --include="*.yml" --include="*.yaml" || (echo "❌ 发现硬编码 JWT 密钥" && exit 1)
          ! grep -r "minioadmin" backend/src/ --include="*.yml" --include="*.yaml" || (echo "❌ 发现硬编码 MinIO 密钥" && exit 1)
          echo "✅ 未发现硬编码敏感信息"

      - name: 📋 检查 .env.example 完整性
        run: |
          echo "检查必需的环境变量..."
          required_vars=("DB_PASSWORD" "JWT_SECRET" "MINIO_ACCESS_KEY" "MINIO_SECRET_KEY")
          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" .env.example; then
              echo "❌ .env.example 缺少必需变量：$var"
              exit 1
            fi
          done
          echo "✅ .env.example 配置完整"

      - name: 📁 检查必要文件
        run: |
          echo "检查必要文件是否存在..."
          files=(
            "docker-compose.yml"
            ".env.example"
            "backend/Dockerfile"
            "frontend/Dockerfile"
            "backend/pom.xml"
            "frontend/package.json"
          )
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ 缺少必要文件：$file"
              exit 1
            fi
          done
          echo "✅ 所有必要文件存在"

  #-------------------------------------------------------------------------------
  # 任务 2：后端编译和测试
  #-------------------------------------------------------------------------------
  backend-build:
    name: ☕ 后端构建
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: 🔧 设置 Java 环境
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 缓存 Maven 依赖
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🏗️ 编译后端
        run: |
          cd backend
          mvn -B clean compile

      - name: 🧪 运行单元测试
        run: |
          cd backend
          mvn -B test

      - name: 📦 打包后端
        run: |
          cd backend
          mvn -B package -DskipTests

      - name: ⬆️ 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  #-------------------------------------------------------------------------------
  # 任务 3：前端构建
  #-------------------------------------------------------------------------------
  frontend-build:
    name: 🎨 前端构建
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: 🔧 设置 Node.js 环境
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 降级 npm（修复 Exit handler bug）
        run: npm install -g npm@9.8.1

      - name: 🏗️ 安装依赖
        run: |
          set -e
          cd frontend
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Removing package-lock.json..."
          rm -f package-lock.json
          echo "Installing dependencies..."
          npm install --no-audit
          echo "Verifying vite installation..."
          ./node_modules/.bin/vite --version

      - name: 🔍 代码检查
        run: |
          cd frontend
          npm run lint || echo "⚠️ Lint 检查未通过（非阻塞）"

      - name: 🎨 构建前端
        run: |
          cd frontend
          npm run build

      - name: ⬆️ 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  #-------------------------------------------------------------------------------
  # 任务 4：Docker 构建
  #-------------------------------------------------------------------------------
  docker-build:
    name: 🐳 Docker 构建
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: ⬇️ 下载后端构建产物
        uses: actions/download-artifact@v5
        with:
          name: backend-jar
          path: backend/target/

      - name: ⬇️ 下载前端构建产物
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: 🔧 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ 构建后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: camera-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ 构建前端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: camera-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      - name: ✅ 验证 Docker 镜像
        run: |
          echo "验证后端镜像..."
          docker images camera-backend:test
          echo "验证前端镜像..."
          docker images camera-frontend:test

  #-------------------------------------------------------------------------------
  # 任务 5：Docker Compose 验证
  #-------------------------------------------------------------------------------
  docker-compose-test:
    name: 🐋 Docker Compose 测试
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v5

      - name: 📋 创建测试用 .env 文件
        run: |
          cp .env.example .env
          echo "DB_PASSWORD=test_password_123!" >> .env
          echo "JWT_SECRET=$(openssl rand -base64 32)" >> .env
          echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY || 'testaccesskey' }}" >> .env
          echo "MINIO_SECRET_KEY=$(openssl rand -hex 20)" >> .env

      - name: 🔍 验证 docker-compose.yml 语法
        run: |
          docker compose config

      - name: 🚀 启动服务（测试模式）
        run: |
          # 仅启动数据库和 Redis 进行验证
          docker compose up -d postgres redis
          sleep 10

      - name: ✅ 验证服务健康状态
        run: |
          docker compose ps
          docker compose logs postgres
          docker compose logs redis

      - name: 🛑 停止服务
        run: |
          docker compose down

  #-------------------------------------------------------------------------------
  # 任务 6：生成报告
  #-------------------------------------------------------------------------------
  ci-report:
    name: 📊 CI 报告
    runs-on: ubuntu-latest
    needs: [code-check, backend-build, frontend-build, docker-build, docker-compose-test]
    if: always()
    steps:
      - name: 📝 生成 CI 状态报告
        run: |
          echo "=========================================="
          echo "  CI 执行报告"
          echo "=========================================="
          echo ""
          echo "分支：${{ github.ref_name }}"
          echo "提交：${{ github.sha }}"
          echo "触发者：${{ github.actor }}"
          echo ""
          echo "任务状态："
          echo "  - 代码检查：${{ needs.code-check.result }}"
          echo "  - 后端构建：${{ needs.backend-build.result }}"
          echo "  - 前端构建：${{ needs.frontend-build.result }}"
          echo "  - Docker 构建：${{ needs.docker-build.result }}"
          echo "  - Docker Compose：${{ needs.docker-compose-test.result }}"
          echo ""
          
          # 检查所有任务是否成功
          if [[ "${{ needs.code-check.result }}" == "success" && \
                "${{ needs.backend-build.result }}" == "success" && \
                "${{ needs.frontend-build.result }}" == "success" && \
                "${{ needs.docker-build.result }}" == "success" && \
                "${{ needs.docker-compose-test.result }}" == "success" ]]; then
            echo "✅ 所有 CI 检查通过！"
            exit 0
          else
            echo "❌ 部分 CI 检查失败"
            exit 1
          fi
