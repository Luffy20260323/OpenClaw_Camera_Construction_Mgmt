name: E2E 自动化测试

on:
  push:
    branches: [main, develop, camera1001]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_type:
        description: '测试类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - e2e
          - system-config

env:
  NODE_VERSION: '18'
  BACKEND_PORT: 8080
  BACKEND_LOG: /tmp/backend.log

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    
    timeout-minutes: 30
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: 安装依赖
      run: |
        echo "📦 安装项目依赖..."
        npm ci
        
        echo "📦 安装 Playwright 浏览器..."
        npx playwright install chromium --with-deps
        
        echo "✅ 依赖安装完成"
    
    - name: 检查后端服务状态
      id: backend-check
      run: |
        echo "🔍 检查后端服务是否已部署..."
        
        # 尝试访问后端健康检查接口
        if curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.BACKEND_PORT }}/api/auth/captcha | grep -q "200"; then
          echo "✅ 后端服务已运行"
          echo "backend_exists=true" >> $GITHUB_OUTPUT
        else
          echo "⚠️  后端服务未运行，需要启动"
          echo "backend_exists=false" >> $GITHUB_OUTPUT
        fi
    
    - name: 启动后端服务（如果需要）
      if: steps.backend-check.outputs.backend_exists == 'false'
      run: |
        echo "🚀 后端服务未运行，尝试启动..."
        
        # 检查是否有后端 JAR 文件
        if [ -f "backend/target/camera-lifecycle-system-1.0.0-SNAPSHOT.jar" ]; then
          echo "找到后端 JAR 文件，启动服务..."
          
          # 设置环境变量
          export DB_HOST=localhost
          export DB_PORT=5432
          export DB_NAME=camera_construction_db
          export DB_USER=postgres
          export DB_PASSWORD=postgres
          export JWT_SECRET=test-jwt-secret-for-ci
          export FILE_STORAGE_TYPE=local
          export FILE_UPLOAD_DIR=/tmp/uploads
          
          # 启动后端（后台运行）
          cd backend
          nohup java -jar target/camera-lifecycle-system-1.0.0-SNAPSHOT.jar > ${{ env.BACKEND_LOG }} 2>&1 &
          BACKEND_PID=$!
          echo "后端进程 ID: $BACKEND_PID"
          echo "backend_pid=$BACKEND_PID" >> $GITHUB_OUTPUT
          
          # 等待后端启动
          echo "⏳ 等待后端启动..."
          for i in {1..60}; do
            if curl -s http://localhost:${{ env.BACKEND_PORT }}/api/auth/captcha > /dev/null 2>&1; then
              echo "✅ 后端启动成功！"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ 后端启动超时"
              echo "后端日志:"
              tail -50 ${{ env.BACKEND_LOG }}
              exit 1
            fi
            sleep 2
          done
        else
          echo "⚠️  未找到后端 JAR 文件，跳过 E2E 测试，仅运行代码检查"
          echo "skip_e2e=true" >> $GITHUB_OUTPUT
        fi
    
    - name: 运行 Playwright 测试
      if: steps.backend-check.outputs.backend_exists == 'true' || (steps.backend-check.outputs.backend_exists == 'false' && steps.start-backend.outputs.skip_e2e != 'true')
      run: |
        echo "🧪 开始运行 E2E 测试..."
        
        # 根据输入选择测试类型
        TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
        
        case $TEST_TYPE in
          api)
            echo "运行 API 测试..."
            # API 测试已经在后端测试中覆盖
            ;;
          e2e)
            echo "运行前端 E2E 测试（不含系统配置）..."
            npm run e2e -- --grep-invert "SYS-002"
            ;;
          system-config)
            echo "运行系统配置测试..."
            npm run e2e -- e2e/tests/system-config.spec.ts
            ;;
          all|*)
            echo "运行所有 E2E 测试..."
            npm run e2e
            ;;
        esac
        
        echo "✅ E2E 测试完成"
    
    - name: 上传测试报告
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: e2e/results/html/
        retention-days: 30
    
    - name: 上传 JUnit 测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-results
        path: e2e/results/results.xml
        retention-days: 30
    
    - name: 发布测试结果到 GitHub Summary
      if: always()
      run: |
        echo "## 📊 E2E 测试结果" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "e2e/results/results.xml" ]; then
          TESTS=$(grep -o 'tests="[0-9]*"' e2e/results/results.xml | head -1 | cut -d'"' -f2)
          FAILURES=$(grep -o 'failures="[0-9]*"' e2e/results/results.xml | head -1 | cut -d'"' -f2)
          ERRORS=$(grep -o 'errors="[0-9]*"' e2e/results/results.xml | head -1 | cut -d'"' -f2)
          
          echo "**总测试数**: $TESTS" >> $GITHUB_STEP_SUMMARY
          echo "**失败数**: $FAILURES" >> $GITHUB_STEP_SUMMARY
          echo "**错误数**: $ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
            echo "✅ **所有测试通过！**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **有测试失败，请检查**" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️  未找到测试结果文件" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📁 测试报告" >> $GITHUB_STEP_SUMMARY
        echo "- [下载 HTML 报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  test-summary:
    runs-on: ubuntu-latest
    needs: e2e-test
    if: always()
    
    steps:
    - name: 下载测试结果
      uses: actions/download-artifact@v4
      with:
        name: junit-results
        path: ./results
    
    - name: 生成测试总结
      run: |
        echo "## 🎯 测试执行总结" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "results/results.xml" ]; then
          echo "### 📊 测试结果" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat results/results.xml | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 相关链接" >> $GITHUB_STEP_SUMMARY
        echo "- [查看完整测试报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "- [E2E 测试指南](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/e2e/README.md)" >> $GITHUB_STEP_SUMMARY
