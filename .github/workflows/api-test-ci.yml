name: API 自动化测试

on:
  push:
    branches: [main, develop, camera1001]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '17'
  BACKEND_PORT: 8080
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: camera_construction_db
  DB_USER: postgres
  DB_PASSWORD: postgres

jobs:
  api-test:
    runs-on: ubuntu-latest
    
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: 设置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: 编译后端代码
      working-directory: ./backend
      run: |
        echo "🔨 编译后端代码..."
        mvn clean compile -DskipTests
        
        echo "✅ 编译完成"
    
    - name: 运行单元测试
      working-directory: ./backend
      run: |
        echo "🧪 运行 Maven 单元测试..."
        mvn test
        
        echo "✅ 单元测试完成"
    
    - name: 打包后端应用
      working-directory: ./backend
      run: |
        echo "📦 打包后端应用..."
        mvn package -DskipTests
        
        echo "✅ 打包完成"
    
    - name: 启动后端服务
      run: |
        echo "🚀 启动后端服务..."
        
        # 设置环境变量
        export DB_HOST=${{ env.DB_HOST }}
        export DB_PORT=${{ env.DB_PORT }}
        export DB_NAME=${{ env.DB_NAME }}
        export DB_USER=${{ env.DB_USER }}
        export DB_PASSWORD=${{ env.DB_PASSWORD }}
        export JWT_SECRET=test-jwt-secret-for-ci
        export FILE_STORAGE_TYPE=local
        export FILE_UPLOAD_DIR=/tmp/uploads
        
        # 启动后端（后台运行）
        cd backend
        nohup java -jar target/camera-lifecycle-system-1.0.0-SNAPSHOT.jar > /tmp/backend.log 2>&1 &
        BACKEND_PID=$!
        echo "后端进程 ID: $BACKEND_PID"
        
        # 等待后端启动
        echo "⏳ 等待后端启动..."
        for i in {1..60}; do
          if curl -s http://localhost:${{ env.BACKEND_PORT }}/api/auth/captcha > /dev/null 2>&1; then
            echo "✅ 后端启动成功！"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ 后端启动超时"
            echo "后端日志:"
            tail -50 /tmp/backend.log
            exit 1
          fi
          sleep 2
        done
    
    - name: 运行 API 测试脚本
      run: |
        echo "🧪 运行 API 测试..."
        
        # 创建测试脚本
        cat > /tmp/run_api_tests.sh << 'EOF'
        #!/bin/bash
        API_BASE="http://localhost:8080"
        PASS=0
        FAIL=0
        
        echo "=========================================="
        echo "API 自动化测试"
        echo "=========================================="
        
        # AUTH-002: 验证码接口
        echo -n "【1/3】AUTH-002: 验证码接口... "
        RESP=$(curl -s -w "\n%{http_code}" $API_BASE/api/auth/captcha)
        CODE=$(echo "$RESP" | tail -1)
        if [ "$CODE" = "200" ]; then
          echo "✅ 通过"
          ((PASS++))
        else
          echo "❌ 失败 (HTTP $CODE)"
          ((FAIL++))
        fi
        
        # AUTH-001: 登录接口
        echo -n "【2/3】AUTH-001: 登录接口... "
        RESP=$(curl -s -w "\n%{http_code}" -X POST $API_BASE/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"username":"admin","password":"admin123","captcha":"test"}')
        CODE=$(echo "$RESP" | tail -1)
        # 登录可能失败（验证码错误），但接口应该正常响应
        if [ "$CODE" = "200" ] || [ "$CODE" = "400" ]; then
          echo "✅ 通过"
          ((PASS++))
        else
          echo "❌ 失败 (HTTP $CODE)"
          ((FAIL++))
        fi
        
        # COMP-001: 公司列表（需要 token）
        echo -n "【3/3】COMP-001: 公司列表... "
        # 先登录获取 token
        LOGIN_RESP=$(curl -s -X POST $API_BASE/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"username":"admin","password":"admin123","captcha":"test"}')
        TOKEN=$(echo $LOGIN_RESP | grep -o '"token":"[^"]*' | cut -d'"' -f4)
        
        if [ -n "$TOKEN" ]; then
          RESP=$(curl -s -w "\n%{http_code}" "$API_BASE/api/company?page=1&pageSize=10" \
            -H "Authorization: Bearer $TOKEN")
          CODE=$(echo "$RESP" | tail -1)
          if [ "$CODE" = "200" ]; then
            echo "✅ 通过"
            ((PASS++))
          else
            echo "❌ 失败 (HTTP $CODE)"
            ((FAIL++))
          fi
        else
          echo "⚠️  跳过（无法获取 token）"
        fi
        
        echo "=========================================="
        echo "测试结果：$PASS 通过，$FAIL 失败"
        echo "=========================================="
        
        if [ $FAIL -gt 0 ]; then
          exit 1
        fi
        EOF
        
        chmod +x /tmp/run_api_tests.sh
        bash /tmp/run_api_tests.sh
    
    - name: 上传后端日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-log
        path: /tmp/backend.log
        retention-days: 7
    
    - name: 上传测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results
        path: backend/target/surefire-reports/
        retention-days: 30
