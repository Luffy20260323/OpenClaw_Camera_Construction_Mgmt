name: API 自动化测试

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式'
        required: true
        default: 'core'
        type: choice
        options:
          - core
          - full
          - regression

env:
  NODE_VERSION: '18'
  API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:8080' }}
  ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

jobs:
  api-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'testpassword123' }}
          MYSQL_DATABASE: camera_construction
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Wait for MySQL
      run: |
        echo "Waiting for MySQL to be ready..."
        MYSQL_ROOT_PWD="${{ secrets.MYSQL_ROOT_PASSWORD || 'testpassword123' }}"
        for i in {1..30}; do
          if mysql -h 127.0.0.1 -P 3306 -uroot -p"$MYSQL_ROOT_PWD" -e "SELECT 1" &> /dev/null; then
            echo "MySQL is ready!"
            exit 0
          fi
          sleep 1
        done
        echo "MySQL is not ready after 30 seconds"
        exit 1
    
    - name: Run database migrations
      working-directory: ./backend
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'testpassword123' }}
        DB_NAME: camera_construction
      run: npm run migrate
    
    - name: Start backend server
      working-directory: ./backend
      env:
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD || 'testpassword123' }}
        DB_NAME: camera_construction
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-for-ci' }}
        PORT: 8080
      run: |
        npm start &
        sleep 10
        echo "Backend server started"
    
    - name: Health check
      run: |
        for i in {1..10}; do
          if curl -s http://localhost:8080/api/health &> /dev/null; then
            echo "Backend is healthy!"
            exit 0
          fi
          sleep 2
        done
        echo "Backend health check failed"
        exit 1
    
    - name: Run Core API Tests (25 cases)
      if: github.event.inputs.test_mode == 'core' || github.event_name == 'push'
      working-directory: ./backend
      env:
        API_BASE_URL: http://localhost:8080
        TEST_MODE: core
      run: npm run test:api -- --reporter=jest-junit --testPathPattern="tests/api/core"
      continue-on-error: false
    
    - name: Run Full API Tests (46 cases)
      if: github.event.inputs.test_mode == 'full'
      working-directory: ./backend
      env:
        API_BASE_URL: http://localhost:8080
        TEST_MODE: full
      run: npm run test:api -- --reporter=jest-junit --testPathPattern="tests/api"
      continue-on-error: false
    
    - name: Run Regression Tests (25 verified cases)
      if: github.event.inputs.test_mode == 'regression' || github.event_name == 'pull_request'
      working-directory: ./backend
      env:
        API_BASE_URL: http://localhost:8080
        TEST_MODE: regression
      run: npm run test:api -- --reporter=jest-junit --testPathPattern="tests/api/regression"
      continue-on-error: false
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: backend/tests/reports/
        retention-days: 1
    
    - name: Publish test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: API Test Results
        path: backend/tests/reports/jest-junit.xml
        reporter: jest-junit
        fail-on-error: false

  frontend-test:
    runs-on: ubuntu-latest
    needs: api-test
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run lint
      working-directory: ./frontend
      run: npm run lint
    
    - name: Run unit tests
      working-directory: ./frontend
      run: npm run test:unit -- --coverage
    
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

  notify:
    runs-on: ubuntu-latest
    needs: [api-test, frontend-test]
    if: always()
    
    steps:
    - name: Check test status
      run: |
        if [ "${{ needs.api-test.result }}" == "failure" ]; then
          echo "❌ API Tests Failed"
          exit 1
        elif [ "${{ needs.frontend-test.result }}" == "failure" ]; then
          echo "❌ Frontend Tests Failed"
          exit 1
        else
          echo "✅ All Tests Passed"
        fi
