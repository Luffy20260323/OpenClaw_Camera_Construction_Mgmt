#===============================================================================
# 摄像头生命周期管理系统 - Docker Compose 配置
#===============================================================================
# 使用说明：
# 1. 复制 .env.example 为 .env 并修改配置
# 2. 启动所有服务：docker-compose up -d
# 3. 查看日志：docker-compose logs -f
# 4. 停止服务：docker-compose down
#
# 包含的服务：
# - PostgreSQL (数据库)
# - Redis (缓存)
# - MinIO (文件存储，可选)
# - Backend (Spring Boot 后端)
# - Frontend (Nginx 托管前端)
#===============================================================================

version: '3.8'

services:
  #-------------------------------------------------------------------------------
  # PostgreSQL 数据库
  #-------------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: camera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-camera_construction_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - camera-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  #-------------------------------------------------------------------------------
  # Redis 缓存
  #-------------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: camera-redis
    restart: unless-stopped
    command: redis-server
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - camera-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  #-------------------------------------------------------------------------------
  # MinIO 对象存储（可选，如使用本地存储可注释）
  #-------------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: camera-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Console 端口
    command: server /data --console-address ":9001"
    networks:
      - camera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  #-------------------------------------------------------------------------------
  # Spring Boot 后端
  #-------------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: camera-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-camera_construction_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # 文件存储配置
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-camera-system}
      # 日志配置
      LOG_FILE: /var/log/application.log
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - backend_logs:/var/log
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - camera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  #-------------------------------------------------------------------------------
  # Nginx 前端
  #-------------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8080}/api
    container_name: camera-frontend
    restart: unless-stopped
    volumes:
      - ./deploy/nginx-http.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - camera-network

#-------------------------------------------------------------------------------
# 网络配置
#-------------------------------------------------------------------------------
networks:
  camera-network:
    driver: bridge

#-------------------------------------------------------------------------------
# 数据卷配置
#-------------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local
  frontend_logs:
    driver: local
